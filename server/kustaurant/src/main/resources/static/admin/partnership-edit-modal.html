<div id="partnership-edit-modal" class="admin-modal hidden">

    <div class="admin-modal-overlay"></div>

    <div class="admin-modal-content">

        <div class="admin-modal-header">
            <h3>제휴 정보 수정</h3>
            <button id="edit-modal-close" class="modal-close-btn">×</button>
        </div>

        <div class="admin-modal-body">

            <input type="hidden" id="edit-partnership-id">

            <div class="form-group">
                <label>음식점 ID</label>
                <input type="number" id="edit-restaurant-id">
            </div>

            <div class="form-group">
                <label>제휴업체명</label>
                <input type="text" id="edit-restaurant-name">
            </div>

            <div class="form-group">
                <label>혜택</label>
                <input type="text" id="edit-benefit">
            </div>

            <div class="form-group">
                <label>전화번호</label>
                <input type="text" id="edit-contact-phone">
            </div>

            <div class="form-group">
                <label>상태</label>
                <select id="edit-status">
                    <option value="MATCHED">MATCHED</option>
                    <option value="UNMATCHED">UNMATCHED</option>
                </select>
            </div>

        </div>

        <div class="admin-modal-footer">
            <button id="edit-cancel-btn">취소</button>
            <button id="edit-submit-btn">수정 저장</button>
        </div>

    </div>

</div>
