<div id="crawl-modal" class="admin-modal hidden">
    <div class="admin-modal-overlay"></div>

    <div class="admin-modal-content">
        <div class="admin-modal-header">
            <h3>인스타 제휴 크롤링 실행</h3>
            <button type="button" id="crawl-modal-close" class="modal-close-btn">×</button>
        </div>

        <div class="admin-modal-body">
            <div class="form-group">
                <label for="crawl-account">인스타 계정</label>
                <input type="text" id="crawl-account" placeholder="ex) kustaurant_official">
            </div>

            <div class="form-group">
                <label for="crawl-target">타겟 단과대</label>
                <select id="crawl-target">
                    <option value="">선택하세요</option>
                    <option value="ALL">전체 (alliance.student.konkuk) </option>
                    <option value="ENGINEERING">공과대학 (konkuk_engineering) </option>
                    <option value="LIBERAL">문과대학 (ku_liberal_arts) </option>
                    <option value="EDUCATION">사범대학 (konkuk_edu_co) </option>
                    <option value="SOCIAL_SCIENCE">사회과학대학 (alliance_ku_social_sciences) </option>
                    <option value="LIFE_SCIENCE">생명과학대학 (ku_lifescience_alliance) </option>
                    <option value="VETERINARY">수의과대학 (ku_vetmed_alliance) </option>
                    <option value="SCIENCE">이과대학 (kuns_alliance) </option>
                    <option value="ART_DESIGN">예술디자인대학 (konkuk_artdesign) </option>
                    <option value="CONVERGENCE">융합과학기술원 (konkuk.kit(X)) </option>
                    <option value="CLUBUNION">동아리연합 (kuclubunion) </option>
                    <option value="WELFARE">학생복지위원회 (ku_welfare) </option>
                </select>
            </div>

            <p class="crawl-help-text">
                입력한 계정을 기준으로 크롤링 후 자동 매칭까지 수행합니다.
            </p>
        </div>

        <div class="admin-modal-footer">
            <button type="button" id="crawl-cancel-btn">취소</button>
            <button type="button" id="crawl-submit-btn">크롤링 실행</button>
        </div>
    </div>
</div>
